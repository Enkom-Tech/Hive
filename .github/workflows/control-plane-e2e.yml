name: Control plane E2E

on:
  workflow_dispatch:
    inputs:
      skip_llm:
        description: "Skip LLM-dependent assertions (default: true)"
        type: boolean
        default: true
  push:
    branches: [main]
    paths: ['control-plane/**']
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: control-plane-e2e-${{ github.event_name }}-${{ github.sha || github.run_id }}
  cancel-in-progress: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: control-plane
    env:
      HIVE_E2E_SKIP_LLM: ${{ github.event_name == 'workflow_dispatch' && (inputs.skip_llm && 'true' || 'false') || 'true' }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: control-plane/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        if: github.event_name != 'workflow_dispatch' || inputs.skip_llm
        run: pnpm run test:e2e

      - name: Run e2e tests (with LLM)
        if: github.event_name == 'workflow_dispatch' && !inputs.skip_llm
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pnpm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            control-plane/tests/e2e/playwright-report/
            control-plane/tests/e2e/test-results/
          retention-days: 14
