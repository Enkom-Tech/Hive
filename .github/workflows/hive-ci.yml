name: Hive CI
on:
  push:
    branches: [main]
    paths: ['infra/**']
  pull_request:
    branches: [main]
    paths: ['infra/**']
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'
      - name: Lint operator
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          cd infra/operator
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...
      - name: Lint worker
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          cd infra/worker
          golangci-lint run ./...
      - name: Lint manifests
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          go install github.com/yannh/kubeconform/cmd/kubeconform@latest
          kubeconform -strict -skip Certificate -skip CertificateSigningRequest -skip Ingress infra/manifests/**/*.yaml
          kubeconform -strict -kubernetes-version 1.29.0 infra/model-gateway/bifrost/networkpolicy.yaml
          kubeconform -strict -kubernetes-version 1.29.0 infra/model-gateway/bifrost/networkpolicy-board-egress.example.yaml
      - name: Kustomize storage bundles (render + schema validate)
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          go install github.com/yannh/kubeconform/cmd/kubeconform@latest
          kc() { kubectl kustomize "$1" | kubeconform -strict -kubernetes-version 1.29.0 -skip Certificate -skip CertificateSigningRequest -skip Ingress -; }
          kc infra/manifests/storage
          kc infra/manifests/storage/overlays/object-minio
          kc infra/manifests/storage/overlays/meta-external
          kc infra/manifests/storage/overlays/object-external-s3
          kc infra/manifests/storage/overlays/fully-external
      - name: Kustomize CocoIndex local-dev overlay (CRD fragments — schema skipped)
        run: kubectl kustomize --load-restrictor=LoadRestrictionsNone infra/cocoindex-lancedb/k8s/overlays/local-dev >/tmp/cocoindex-local-dev.yaml
  storage-kind:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          cluster_name: hive-storage-ci
          wait: 120s
          # Pin node image: default kindest/node v1.35+ can fail kubelet health on Docker Desktop/WSL; v1.29.x is validated locally + CI.
          node_image: kindest/node:v1.29.14
      - name: Apply storage bundle (RustFS + Dragonfly default)
        run: kubectl apply -k infra/manifests/storage
      - name: Wait for StatefulSets
        run: |
          kubectl rollout status statefulset/dragonfly -n hive-storage --timeout=300s
          kubectl rollout status statefulset/rustfs -n hive-storage --timeout=300s
      - name: Verify pods Running
        run: |
          kubectl get pods,svc,pvc -n hive-storage -o wide
          test "$(kubectl get pod -n hive-storage -l app=dragonfly -o jsonpath='{.items[0].status.phase}')" = "Running"
          test "$(kubectl get pod -n hive-storage -l app=rustfs -o jsonpath='{.items[0].status.phase}')" = "Running"
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'
      - name: Test operator
        run: |
          cd infra/operator
          go test ./... -short -race -count=1 -coverprofile=coverage.out
      - name: Test worker
        run: |
          cd infra/worker
          go test ./... -short -race -count=1 -coverprofile=coverage.out
      - name: Test model-gateway-go
        run: |
          cd infra/model-gateway-go
          go test ./... -short -race -count=1
      - name: Test bifrost-sync
        run: |
          cd infra/bifrost-sync
          go test ./... -short -race -count=1
      - name: Test bifrost-hive-metering
        run: |
          cd infra/bifrost-hive-metering
          go test ./... -short -race -count=1
  test-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'
      - name: Integration tests (operator envtest)
        run: |
          cd infra/operator
          go test ./controllers/... -race -count=1
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'
      - name: gosec operator
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          cd infra/operator && gosec ./...
      - name: gosec worker
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          cd infra/worker && gosec ./...
      - name: govulncheck
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          go install golang.org/x/vuln/cmd/govulncheck@latest
          cd infra/operator && govulncheck ./...
          cd ../worker && govulncheck ./...
          cd ../bifrost-sync && govulncheck ./...
          cd ../bifrost-hive-metering && govulncheck ./...
      - name: go mod verify
        run: |
          cd infra/operator && go mod verify
          cd ../worker && go mod verify
          cd ../bifrost-sync && go mod verify
          cd ../bifrost-hive-metering && go mod verify
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'
      - name: Build operator
        run: |
          cd infra/operator
          go build -o manager .
      - name: Build worker
        run: |
          cd infra/worker
          go build -o hive-worker ./cmd/worker
      - name: Build bifrost-sync
        run: |
          cd infra/bifrost-sync
          go build -o bifrost-sync .
      - name: Docker build operator
        run: |
          docker build -t hive-operator:latest infra/operator
      - name: Docker build worker
        run: |
          docker build -t hive-worker:latest infra/worker
      - name: Grype scan operator
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: 'hive-operator:latest'
          fail-build: true
          severity-cutoff: high

  cocoindex-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/cocoindex-lancedb
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            infra/cocoindex-lancedb/requirements.lock
            infra/cocoindex-lancedb/requirements-dev.txt

      - name: Install dependencies (hash-locked runtime + dev)
        run: |
          pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.txt pip-audit

      - name: Bandit SAST scan
        run: bandit -r cocoindex_server.py auth.py -ll -ii

      - name: pip-audit vulnerability check
        run: pip-audit -r requirements.lock

      - name: pip check (transitive dependency consistency)
        run: pip check

      - name: Ruff lint
        run: ruff check cocoindex_server.py auth.py

      - name: Mypy type check
        run: mypy cocoindex_server.py auth.py --ignore-missing-imports

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.26.1'

      - name: MCP worker blocklist parity (shared blocklist.json)
        run: |
          chmod +x scripts/verify-mcp-blocklist-parity.sh
          ./scripts/verify-mcp-blocklist-parity.sh
          cd mcp-gateway-go && go test ./... -short -count=1

      - name: Unit and integration tests
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --cov=. --cov-report=xml -x
          else
            echo "No tests directory — skipping"
          fi

  cocoindex-build:
    runs-on: ubuntu-latest
    needs: cocoindex-lint-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Docker build cocoindex
        run: docker build -t cocoindex:latest infra/cocoindex-lancedb

      - name: SBOM (cocoindex image)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: cocoindex:latest
          artifact-name: sbom-cocoindex.spdx.json

      - name: Grype scan cocoindex
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          image: 'cocoindex:latest'
          fail-build: true
          severity-cutoff: high

  docindex-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/docindex-lancedb
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            infra/docindex-lancedb/requirements-ci.lock
            infra/docindex-lancedb/requirements-api.lock
            infra/docindex-lancedb/worker/requirements.lock
            infra/docindex-lancedb/requirements-dev.txt

      - name: Install dependencies (hash-locked CI merge + dev)
        run: |
          pip install --upgrade pip
          pip install -r requirements-ci.lock
          pip install -r requirements-dev.txt pip-audit

      - name: Bandit SAST scan
        run: |
          bandit -r docindex_server.py auth.py document_parsers.py document_chunker.py \
            docindex_worker.py docindex_jobs.py docindex_constants.py -ll -ii

      # Pygments 2.19.2: CVE-2026-4539 (ReDoS in AdlLexer) — no fixed PyPI release yet; transitive via docling stack.
      - name: pip-audit vulnerability check (CI merge lock)
        run: pip-audit -r requirements-ci.lock --ignore-vuln CVE-2026-4539

      - name: pip-audit slim API image lock
        run: pip-audit -r requirements-api.lock

      - name: pip-audit worker image lock
        run: pip-audit -r worker/requirements.lock --ignore-vuln CVE-2026-4539

      - name: pip check (transitive dependency consistency)
        run: pip check

      - name: Ruff lint
        run: |
          ruff check docindex_server.py auth.py document_parsers.py document_chunker.py \
            docindex_worker.py docindex_jobs.py docindex_constants.py

      - name: Mypy type check
        run: |
          mypy docindex_server.py auth.py document_parsers.py document_chunker.py \
            docindex_worker.py docindex_jobs.py docindex_constants.py --ignore-missing-imports

      - name: Unit and integration tests
        run: pytest tests/ -v --cov=. --cov-report=xml -x

  docindex-build:
    runs-on: ubuntu-latest
    needs: docindex-lint-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Docker build docindex API
        run: docker build -t docindex:latest infra/docindex-lancedb

      - name: Docker build docindex worker
        run: docker build -f Dockerfile.worker -t docindex-worker:latest infra/docindex-lancedb

      - name: SBOM (docindex API image)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: docindex:latest
          artifact-name: sbom-docindex-api.spdx.json

      - name: SBOM (docindex worker image)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: docindex-worker:latest
          artifact-name: sbom-docindex-worker.spdx.json

      - name: Grype scan docindex API
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          image: 'docindex:latest'
          fail-build: true
          severity-cutoff: high

      - name: Grype scan docindex worker
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
        with:
          image: 'docindex-worker:latest'
          fail-build: true
          severity-cutoff: high
