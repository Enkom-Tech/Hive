name: Control plane PR E2E

on:
  pull_request:
    branches: [main]
    paths: ['control-plane/**']

concurrency:
  group: control-plane-pr-e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: control-plane
    env:
      HIVE_E2E_SKIP_LLM: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: control-plane/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm build

      - uses: actions/setup-go@v6
        with:
          go-version-file: infra/worker/go.mod
          cache-dependency-path: infra/worker/go.sum

      - name: Build hive-worker (MCP E2E smoke)
        working-directory: infra/worker
        run: go build -o hive-worker .

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        env:
          HIVE_E2E_HIVE_WORKER_BINARY: ${{ github.workspace }}/infra/worker/hive-worker
          HIVE_WORKER_JWT_SECRET: hive-e2e-worker-jwt-secret-at-least-32-chars!!
          HIVE_E2E_MCP_MATERIALIZE_SECRET: hive-e2e-mcp-materialize-secret
        run: pnpm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report-pr
          path: |
            control-plane/tests/e2e/playwright-report/
            control-plane/tests/e2e/test-results/
          retention-days: 7
