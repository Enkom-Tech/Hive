# Dependabot: opens PRs for dependency updates on a schedule. No manual runs.
# `groups` rolls all updates in each directory into a single weekly PR per ecosystem.
# https://docs.github.com/en/code-security/dependabot
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/control-plane"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      control-plane-npm:
        patterns:
          - "*"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - "dependencies"

  - package-ecosystem: "gomod"
    directory: "/infra/operator"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      infra-operator-go:
        patterns:
          - "*"
    labels:
      - "dependencies"

  - package-ecosystem: "gomod"
    directory: "/infra/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    groups:
      infra-worker-go:
        patterns:
          - "*"
    labels:
      - "dependencies"

  # Python: CocoIndex — Dependabot updates requirements.txt; re-run pip-compile after merges.
  - package-ecosystem: "pip"
    directory: "/infra/cocoindex-lancedb"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      cocoindex-pip:
        patterns:
          - "*"
    labels:
      - "dependencies"

  # DocIndex API — requirements.txt is the manifest (hash lock: requirements-api.lock).
  - package-ecosystem: "pip"
    directory: "/infra/docindex-lancedb"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      docindex-pip:
        patterns:
          - "*"
    labels:
      - "dependencies"

  # DocIndex parser worker — worker/requirements.txt + worker/requirements.lock.
  - package-ecosystem: "pip"
    directory: "/infra/docindex-lancedb/worker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      docindex-worker-pip:
        patterns:
          - "*"
    labels:
      - "dependencies"
