apiVersion: hive.io/v1alpha1
kind: HiveWorkerPool
metadata:
  name: example-workers
  namespace: hive-system
spec:
  companyRef: example
  replicas: 1
  workerImage: hive-worker:latest
  nodeSelector:
    hive.io/location: cloud
  # Optional: single OpenAI-compatible URL for LLM inference (model gateway).
  # modelGatewayURL: "http://model-gateway.default.svc.cluster.local:8080/v1"
