apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hive-storage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Enkom-Tech/Hive
    path: infra/manifests/storage
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: hive-storage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
