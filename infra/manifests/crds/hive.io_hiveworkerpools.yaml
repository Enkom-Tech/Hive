apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hiveworkerpools.hive.io
spec:
  group: hive.io
  names:
    kind: HiveWorkerPool
    listKind: HiveWorkerPoolList
    plural: hiveworkerpools
    singular: hiveworkerpool
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [companyRef, workerImage]
              properties:
                companyRef:
                  type: string
                replicas:
                  type: integer
                  minimum: 0
                  maximum: 50
                  default: 1
                workerImage:
                  type: string
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                tolerations:
                  type: array
                  items:
                    type: object
                resources:
                  type: object
                adapterConfig:
                  type: object
                  additionalProperties:
                    type: string
                modelGatewayURL:
                  type: string
                  description: OpenAI-compatible base URL for LLM inference (e.g. hive-model-gateway-go or Bifrost). When set, the worker receives HIVE_MODEL_GATEWAY_URL (include /v1). For Bifrost with mandatory virtual keys, also set OPENAI_API_KEY (sk-bf-...) on the worker pod; containerized adapters receive gateway-related env from the worker when set.
                codeIndexerName:
                  type: string
                  description: metadata.name of the HiveIndexer for HIVE_MCP_CODE_* when multiple indexers exist; empty means lexicographically first ready indexer with a gateway.
                docIndexerName:
                  type: string
                  description: metadata.name of the HiveDocIndexer for HIVE_MCP_DOCS_* when multiple doc indexers exist; empty means lexicographically first ready indexer with a gateway.
            status:
              type: object
              properties:
                readyReplicas:
                  type: integer
                healthyAgents:
                  type: integer
                lastSyncAt:
                  type: string
                syncedAgentIds:
                  type: array
                  items:
                    type: string
                conditions:
                  type: array
                  items:
                    type: object
          x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
