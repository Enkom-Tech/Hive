# juicefs-secret is the single source of truth for CSI + in-cluster object store credentials:
#   access-key / secret-key — consumed by RustFS or MinIO (object-minio) and by JuiceFS CSI.
# metaurl password MUST match dragonfly-auth when Dragonfly uses requirepass.
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: juicefs-sc
provisioner: csi.juicefs.com
parameters:
  csi.storage.k8s.io/provisioner-secret-name: juicefs-secret
  csi.storage.k8s.io/provisioner-secret-namespace: hive-storage
reclaimPolicy: Retain
volumeBindingMode: Immediate
---
apiVersion: v1
kind: Secret
metadata:
  name: juicefs-secret
  namespace: hive-storage
stringData:
  name: hive-fs
  # Must match dragonfly-auth password (redis://:password@host:port/db)
  metaurl: "redis://:changeme-dragonfly@dragonfly.hive-storage.svc.cluster.local:6379/1"
  storage: "s3"
  # Bucket is created on first use by JuiceFS if the store allows it; path-style endpoint for RustFS.
  bucket: "http://rustfs.hive-storage.svc.cluster.local:9000/hive-juicefs"
  access-key: "rustfsadmin"
  secret-key: "rustfsadmin"
