# K8s Secret templates for CocoIndex.
# NEVER commit real values — use Sealed Secrets, External Secrets Operator,
# or Vault to populate these in production.
#
# Apply with: kubectl apply -f cocoindex-secrets.yaml -n hive-tenant-<companyID>
---
# API token for the CocoIndex HTTP API.
# Generated automatically by the HiveIndexer controller when TokenSecretRef is empty.
# Workers use this to authenticate to the indexer's /search endpoint.
apiVersion: v1
kind: Secret
metadata:
  name: cocoindex-api-token
  namespace: hive-tenant-REPLACE_WITH_COMPANY_ID
type: Opaque
stringData:
  token: ""  # replaced by HiveIndexer controller or external secrets manager
---
# DragonflyDB password.
# If you use `infra/manifests/storage/dragonfly.yaml`, it already defines `dragonfly-auth`
# in hive-storage — use the same password there and here, or omit this Secret and reference the existing one.
# Reference in HiveIndexer spec as: dragonflySecretRef: dragonfly-auth
apiVersion: v1
kind: Secret
metadata:
  name: dragonfly-auth
  namespace: hive-storage
type: Opaque
stringData:
  password: ""  # replace with a strong random password before applying
