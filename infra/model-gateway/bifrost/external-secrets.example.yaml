# Example: External Secrets Operator — sync OpenBao/Vault KV into a tenant Secret for HiveWorkerPool.modelGatewayCredentialSecret.
# Requires: ESO installed, SecretStore/ClusterSecretStore pointing at OpenBao, and paths populated after board mints sk-bf-*.
#
# Not applied by default; copy values into your GitOps repo.
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: openbao-hive
  namespace: hive-workers
spec:
  provider:
    vault:
      server: "https://openbao.hive-security.svc:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "hive-tenant-secrets"
          serviceAccountRef:
            name: default
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: hive-model-gateway-vk
  namespace: hive-workers
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao-hive
    kind: SecretStore
  target:
    name: hive-model-gateway-acme
    creationPolicy: Owner
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: hive/default/a0000000-0000-4000-8000-000000000001/model-gateway
        property: sk_bf_token
# HiveWorkerPool.spec.modelGatewayCredentialSecret: secretName hive-model-gateway-acme, key OPENAI_API_KEY
